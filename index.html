<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GG FC Player Rating System</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-storage-compat.js"></script>
</head>
<body>
    <div id="app">
        <!-- Navigation -->
        <nav>
            <div class="nav-brand">
                <span class="logo">⚽</span>
                <h1>GG FC Ratings</h1>
            </div>
            <div id="nav-buttons"></div>
        </nav>

        <!-- LOGIN VIEW -->
        <div id="login-view" class="section auth-card">
            <h2>Welcome back</h2>
            <p class="subtitle">Sign in to rate players and view rankings</p>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••" required>
            </div>
            <button class="btn-primary full-width" onclick="login()">Login</button>
            <p class="switch-auth">Don't have an account? <a href="#" onclick="showRegisterView(); return false;">Register here</a></p>
        </div>

        <!-- REGISTER VIEW -->
        <div id="register-view" class="section auth-card hidden">
            <h2>Create Account</h2>
            <p class="subtitle">Join GG FC and start rating players</p>

            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="reg-email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password *</label>
                <input type="password" id="reg-password" placeholder="Min 6 characters" required>
            </div>
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" id="reg-fullName" placeholder="e.g. John Smith" required>
            </div>
            <div class="form-group">
                <label>Profile Picture <span class="optional">(optional)</span></label>
                <div class="avatar-upload">
                    <div id="avatar-preview" class="avatar-preview">
                        <span>📷</span>
                    </div>
                    <input type="file" id="reg-profilePic" accept="image/*" onchange="previewProfilePic(event)">
                    <label for="reg-profilePic" class="upload-btn">Choose Photo</label>
                </div>
            </div>
            <div class="form-group">
                <label>Nickname <span class="optional">(optional)</span></label>
                <input type="text" id="reg-nickname" placeholder="e.g. Johnny">
            </div>
            <div class="form-group">
                <label>Preferred Foot *</label>
                <select id="reg-preferredFoot" required>
                    <option value="">Select...</option>
                    <option value="Right">Right</option>
                    <option value="Left">Left</option>
                    <option value="Both">Both</option>
                </select>
            </div>
            <div class="form-group">
                <label>Years Playing Football *</label>
                <input type="number" id="reg-yearsPlaying" min="0" max="50" placeholder="e.g. 5" required>
            </div>
            <div class="form-group">
                <label>About Me <span class="optional">(optional)</span></label>
                <textarea id="reg-aboutMe" placeholder="Tell us about your playing style..."></textarea>
            </div>
            <div class="form-group">
                <label>Positions you can play * <span class="hint">Select at least one</span></label>
                <div id="reg-positions-container"></div>
            </div>
            <div class="form-group">
                <label>Primary Position *</label>
                <select id="reg-primaryPosition" required>
                    <option value="">Select positions first...</option>
                </select>
            </div>

            <button class="btn-primary full-width" onclick="register()">Create Account</button>
            <p class="switch-auth">Already have an account? <a href="#" onclick="showLoginView(); return false;">Login here</a></p>
        </div>

        <!-- MAIN APP (logged in) -->
        <div id="main-app" class="hidden">
            <div id="home-view">
                <div id="welcome-section" class="welcome-card"></div>
                
                <div class="menu-buttons">
                    <button class="btn-menu" onclick="showRatePlayers()">
                        <span class="btn-icon">⭐</span>
                        Rate a Player
                    </button>
                    <button class="btn-menu" onclick="showLeaderboard()">
                        <span class="btn-icon">🏆</span>
                        Leaderboard
                    </button>
                </div>

                <div id="content-area" class="content-card">
                    <!-- Rate list or Leaderboard injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Toast / Popover container -->
    <div id="toast-container"></div>

    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
